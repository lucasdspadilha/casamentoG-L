<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#F7F3EC"/>

  <!-- Botanical decorative arc top-left -->
  <g opacity="0.18" transform="translate(80 80)">
    <path d="M0 0 C 30 -10, 80 -5, 120 30 C 150 60, 160 100, 150 140" fill="none" stroke="#7A9E7E" stroke-width="2.5"/>
    <ellipse cx="40" cy="5" rx="18" ry="6" fill="#7A9E7E" transform="rotate(-30 40 5)"/>
    <ellipse cx="80" cy="15" rx="20" ry="7" fill="#7A9E7E" transform="rotate(-15 80 15)"/>
    <ellipse cx="120" cy="50" rx="22" ry="8" fill="#7A9E7E" transform="rotate(20 120 50)"/>
    <ellipse cx="145" cy="100" rx="20" ry="7" fill="#7A9E7E" transform="rotate(60 145 100)"/>
  </g>

  <!-- Botanical decorative arc bottom-right (mirrored) -->
  <g opacity="0.18" transform="translate(1120 550) scale(-1 -1)">
    <path d="M0 0 C 30 -10, 80 -5, 120 30 C 150 60, 160 100, 150 140" fill="none" stroke="#7A9E7E" stroke-width="2.5"/>
    <ellipse cx="40" cy="5" rx="18" ry="6" fill="#7A9E7E" transform="rotate(-30 40 5)"/>
    <ellipse cx="80" cy="15" rx="20" ry="7" fill="#7A9E7E" transform="rotate(-15 80 15)"/>
    <ellipse cx="120" cy="50" rx="22" ry="8" fill="#7A9E7E" transform="rotate(20 120 50)"/>
    <ellipse cx="145" cy="100" rx="20" ry="7" fill="#7A9E7E" transform="rotate(60 145 100)"/>
  </g>

  <!-- Label -->
  <text x="600" y="180" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="10" text-anchor="middle" fill="#7A9E7E">
    NOSSO CASAMENTO
  </text>

  <!-- Main title -->
  <text x="600" y="320" font-family="Georgia, 'Times New Roman', serif" font-size="120" font-style="italic" font-weight="400" text-anchor="middle" fill="#2C2C2C">
    Giulia &amp; Lucas
  </text>

  <!-- Divider line with leaf -->
  <line x1="430" y1="370" x2="570" y2="370" stroke="#7A9E7E" stroke-width="1.2"/>
  <path d="M600 365 C 605 360, 615 360, 620 365 C 615 370, 605 370, 600 365 Z M600 365 L 620 365" fill="#7A9E7E" stroke="#7A9E7E" stroke-width="0.8"/>
  <line x1="630" y1="370" x2="770" y2="370" stroke="#7A9E7E" stroke-width="1.2"/>

  <!-- Date -->
  <text x="600" y="435" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="300" letter-spacing="6" text-anchor="middle" fill="#2C2C2C">
    07 DE SETEMBRO DE 2026
  </text>

  <!-- Location -->
  <text x="600" y="480" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="300" letter-spacing="2" text-anchor="middle" fill="#5A5A5A">
    Bar Botânico · Pinheiros · São Paulo
  </text>

  <!-- Subtle bottom italic -->
  <text x="600" y="555" font-family="Georgia, serif" font-size="24" font-style="italic" text-anchor="middle" fill="#7A9E7E" opacity="0.9">
    A história continua...
  </text>
</svg>
